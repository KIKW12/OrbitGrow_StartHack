<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrbitGrow — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #050910;
      --panel:  #0a1320;
      --border: #1a2b3c;
      --text:   #c8dae8;
      --muted:  #486278;
      --dimmed: #1c2c3c;
      --ok:     #cce4f6;
      --warn:   #ffbe00;
      --crit:   #ff3224;
      --accent: #1060c8;
      --blue:   #4a90d4;
      --green:  #28d860;
    }

    html, body, #root {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; line-height: 1.4;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    .col-divider { width: 1px; background: var(--border); flex-shrink: 0; }

    .lbl {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
    }

    .sec-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      padding: 3px 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; outline: none; border-radius: 2px;
      transition: all 0.1s;
    }
    .tab-btn:hover { color: var(--text); border-color: #2a4060; }
    .tab-btn.active { background: rgba(16,96,200,0.15); border-color: var(--accent); color: var(--blue); }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 500;
      padding: 4px 12px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.03);
      color: var(--text); cursor: pointer; outline: none; border-radius: 2px;
      transition: all 0.1s;
    }
    .btn:hover { background: rgba(255,255,255,0.06); border-color: #2a4060; }
    .btn-accent { background: var(--accent); border-color: #1a70d8; color: #fff; }
    .btn-accent:hover { background: #1a70d8; }
    .btn-danger { color: var(--crit); border-color: #3a1414; }
    .btn-danger:hover { background: rgba(255,50,36,0.08); }
    .btn-sm { padding: 3px 8px; font-size: 10px; }

    .dot { display: inline-block; width: 6px; height: 6px; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .bar-track { height: 7px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .bar-fill  { height: 100%; transition: width 0.5s ease; }

    .gh-card {
      border: 1px solid var(--border); background: var(--panel);
      padding: 8px 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.1s; min-width: 0;
    }
    .gh-card:hover { background: #0d1828; border-color: #2a4060; }

    .agent-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 10px; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .agent-row:hover { background: rgba(255,255,255,0.015); }
    .agent-row.expanded { background: rgba(255,255,255,0.02); }

    .bubble-user {
      align-self: flex-end;
      background: rgba(16,96,200,0.12); border: 1px solid rgba(16,96,200,0.3);
      padding: 7px 11px; max-width: 88%; border-radius: 2px;
    }
    .bubble-ai {
      align-self: flex-start;
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      padding: 7px 11px; max-width: 92%; border-radius: 2px;
    }
    .bubble-sys { font-size: 10px; color: var(--muted); font-style: italic; padding: 2px 0; }

    .chat-input {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 2px; color: var(--text); outline: none;
      padding: 7px 10px; width: 100%;
    }
    .chat-input::placeholder { color: var(--muted); }
    .chat-input:focus { border-color: var(--accent); }

    .drawer-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.5); }
    .drawer-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 420px;
      background: #070e1a; border-left: 1px solid var(--border);
      z-index: 51; display: flex; flex-direction: column; overflow: hidden;
      animation: slideIn 0.16s ease;
    }
    @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }

    .range-wrap { position: relative; height: 5px; background: rgba(255,255,255,0.07); }

    /* Approval Modal */
    .approval-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .approval-modal {
      width: 540px; max-height: 85vh;
      background: #0a1320; border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from{transform:scale(0.95);opacity:0} to{transform:scale(1);opacity:1} }
    .approval-header {
      padding: 12px 16px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .approval-item {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .approval-item:hover { background: rgba(255,255,255,0.02); }
    .approval-chat {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; flex-direction: column; gap: 8px;
      max-height: 200px;
    }

    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }


    select.ctrl-select {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      background: rgba(255,255,255,0.04); color: var(--text);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 3px 6px; outline: none; cursor: pointer;
    }

    .crit-strip {
      border-left: 3px solid var(--crit);
      background: repeating-linear-gradient(45deg,rgba(255,50,36,0.05),rgba(255,50,36,0.05) 4px,transparent 4px,transparent 10px);
    }
    .warn-strip { border-left: 3px solid var(--warn); background: rgba(255,190,0,0.05); }

    /* Markdown rendered output */
    .md-body { font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--text); }
    .md-body h1, .md-body h2, .md-body h3 {
      font-size: 11px; font-weight: 700; color: #fff;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin: 12px 0 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .md-body h1 { font-size: 12px; }
    .md-body p { margin: 6px 0; }
    .md-body ul, .md-body ol { padding-left: 16px; margin: 6px 0; }
    .md-body li { margin: 3px 0; }
    .md-body strong { color: #fff; font-weight: 600; }
    .md-body em { color: var(--muted); font-style: normal; }
    .md-body code {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 2px; color: var(--ok);
    }
    .md-body pre {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      padding: 8px 10px; margin: 8px 0; overflow-x: auto;
    }
    .md-body pre code { background: none; border: none; padding: 0; color: var(--text); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .md-body blockquote {
      border-left: 3px solid var(--border); padding-left: 10px;
      color: var(--muted); margin: 6px 0;
    }
    .md-body a { color: var(--blue); text-decoration: none; }
    /* Strip emoji from rendered output */
    .md-body .emoji { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// Markdown renderer — strips emojis, renders to sanitized HTML
const EMOJI_RE = /[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}✅❌⚠️🚨]/gu;
function Md({ text, style }) {
  if (!text) return null;
  const clean = text.replace(EMOJI_RE, '');
  const html = typeof marked !== 'undefined'
    ? marked.parse(clean, { breaks: true, gfm: true })
    : clean.replace(/\n/g, '<br/>');
  return <div className="md-body" style={style} dangerouslySetInnerHTML={{ __html: html }}/>;
}

const API    = window.location.origin;
const WS_URL = `ws://${window.location.host}/ws`;

const C = {
  ok: '#cce4f6', warn: '#ffbe00', crit: '#ff3224',
  accent: '#1060c8', blue: '#4a90d4', green: '#28d860',
  text: '#c8dae8', muted: '#486278', dimmed: '#1c2c3c',
  panel: '#0a1320', border: '#1a2b3c', bg: '#050910',
};

const GH_IDS = [
  'gh_potato_1','gh_beans_1','gh_lettuce_1','gh_radish_1','gh_herbs_1',
  'gh_potato_2','gh_beans_2','gh_lettuce_2','gh_radish_2','gh_herbs_2',
];

function ghCropId(id) { return id.replace('gh_','').replace(/_\d$/,''); }
function ghLabel(id) {
  const crop = ghCropId(id);
  const n = id.match(/_(\d)$/)?.[1] || '1';
  const names = { potato:'Potato', beans:'Beans', lettuce:'Lettuce', radish:'Radish', herbs:'Herbs' };
  return `${names[crop]||crop} ${n==='1'?'I':'II'}`;
}

const DEFAULT_STATE = {
  mission_state: { current_sol:0, phase:'nominal', sim_running:false, sim_speed:1, mission_duration:450, mission_complete:false, mcp_connected:false },
  nutrition_ledger: { coverage_score:0, kcal:0, protein_g:0, vitamin_a:0, vitamin_c:0 },
  crew_health: [], sol_history: [],
  food_storage: { kcal:0, days_remaining:0 },
  active_crises: {}, agent_report: {},
  greenhouses: [], mars_env: { temperature:-60, light:400 },
  facility_env: { co2:1200, radiation:0.30, pressure:62000, lighting_energy:18, heating_energy:42, consumed_water:120 },
  astronauts: [], advice: [], crops: {},
};

function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function hColor(h) { return h>=0.8?C.ok:h>=0.5?C.warn:C.crit; }

function GaugeBar({ value, max=1, color, width }) {
  const pct = max>0 ? clamp((value/max)*100,0,100) : 0;
  return (
    <div className="bar-track" style={{width:width||'100%'}}>
      <div className="bar-fill" style={{width:`${pct}%`,background:color}}/>
    </div>
  );
}

function RangeBar({ value, lo, hi, goodLo, goodHi }) {
  const span = hi-lo;
  const leftPct  = clamp(((goodLo-lo)/span)*100,0,100);
  const widthPct = clamp(((goodHi-goodLo)/span)*100,0,100);
  const valPct   = clamp(((value-lo)/span)*100,0,100);
  const isOk     = value>=goodLo && value<=goodHi;
  const col      = isOk?'#28a84a':Math.abs(value-goodLo)<(goodHi-goodLo)*0.5||Math.abs(value-goodHi)<(goodHi-goodLo)*0.5?C.warn:C.crit;
  return (
    <div className="range-wrap">
      <div style={{position:'absolute',left:`${leftPct}%`,width:`${widthPct}%`,height:'100%',background:'rgba(40,168,74,0.2)'}}/>
      <div style={{position:'absolute',left:`${valPct}%`,top:-1,width:2,height:7,background:col,transform:'translateX(-50%)'}}/>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{position:'fixed',inset:0,background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:999,gap:16}}>
      <div className="spinner"/>
      <div style={{fontSize:11,color:C.muted,letterSpacing:'0.14em'}}>ORBITGROW — CONNECTING</div>
    </div>
  );
}

// ── Header — speed controls + reset + alerts only ───────────────────────────
function Header({ state, scanProgress }) {
  const ms    = state.mission_state || {};
  const speed = ms.sim_speed || 1;
  const running = ms.sim_running || false;
  const crises = Object.keys(state.active_crises||{});

  const [busy, setBusy] = useState('');
  const [crisisType, setCrisisType] = useState('water_recycling_failure');

  const CRISIS_OPTIONS = [
    {value:'water_recycling_failure', label:'Water Recycling Failure'},
    {value:'energy_budget_cut',       label:'Energy Budget Cut'},
    {value:'temperature_spike',       label:'Temperature Spike'},
    {value:'disease_outbreak',        label:'Disease Outbreak'},
    {value:'co2_imbalance',    label:'CO₂ Imbalance'},
  ];

  async function simAction(action, extra={}) {
    setBusy(action);
    try { await fetch(`${API}/sim-control`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...extra})}); }
    catch(e){}
    setBusy('');
  }

  async function runOneSol() {
    setBusy('sol');
    try { await fetch(`${API}/run-sol`,{method:'POST'}); }
    catch(e){}
    setBusy('');
  }

  async function injectCrisis() {
    setBusy('inject');
    try { await fetch(`${API}/inject-crisis`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:crisisType})}); }
    catch(e){}
    setBusy('');
  }

  const tickerText = useMemo(()=>{
    const items = [];
    if (crises.length>0) items.push(`ALERT: ${crises.map(c=>c.replace(/_/g,' ').toUpperCase()).join(' / ')}`);
    (state.crew_health||[]).forEach(h=>{ if((h.health_score??100)<60) items.push(`${(h.astronaut||'CREW').toUpperCase()} HEALTH CRITICAL`); });
    const vision = state.agent_report?.vision;
    if(vision?.plots_at_risk?.length>0) items.push(`CV: ${vision.plots_at_risk.length} plot(s) require attention`);
    (state.advice||[]).slice(-2).forEach(a=>items.push(`${a.day||'SOL ?'}: ${typeof a.text==='string'?a.text:JSON.stringify(a.text)}`));
    if(items.length===0) items.push('ALL SYSTEMS NOMINAL  ·  ORBITGROW AUTONOMOUS AGRICULTURE  ·  MARS MISSION ACTIVE');
    return items.join('   //   ');
  },[crises,state.crew_health,state.advice,state.agent_report]);

  const hasCrit = crises.length>0 || (state.crew_health||[]).some(h=>(h.health_score??100)<50);

  return (
    <div style={{
      height:36, flexShrink:0, background:'#05080e',
      borderBottom:`2px solid ${hasCrit?C.crit:C.border}`,
      display:'flex', alignItems:'center', overflow:'hidden',
    }}>
      {/* Controls — 3 buttons each 1/3 of a fixed left block */}
      <div style={{display:'flex',height:'100%',borderRight:`1px solid ${C.border}`,flexShrink:0}}>
        {[
          { label: busy==='sol'?'…':'+1 SOL', action: runOneSol, disabled: running },
          { label: busy==='reset'?'…':'RESET', action: ()=>simAction('reset'), danger: true },
        ].map((b,i)=>(
          <button key={i}
            className={`btn btn-sm${b.danger?' btn-danger':''}`}
            onClick={b.action}
            disabled={b.disabled}
            style={{
              width:90, height:'100%', fontSize:10, letterSpacing:'0.07em',
              borderRadius:0, border:'none', borderRight:`1px solid ${C.border}`,
              opacity: b.disabled ? 0.4 : 1,
            }}>
            {b.label}
          </button>
        ))}
      </div>

      {/* Status line */}
      <div style={{flex:1,overflow:'hidden',padding:'0 12px',display:'flex',alignItems:'center'}}>
        <span style={{fontSize:10,color:hasCrit?C.crit:crises.length>0?C.warn:C.muted,letterSpacing:'0.06em',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
          {scanProgress || (hasCrit ? `ALERT: ${crises.map(c=>c.replace(/_/g,' ').toUpperCase()).join(' / ')}` : crises.length>0 ? `CRISIS: ${crises.map(c=>c.replace(/_/g,' ').toUpperCase()).join(' / ')}` : 'ALL SYSTEMS NOMINAL')}
        </span>
      </div>
    </div>
  );
}

// ── Left Panel ──────────────────────────────────────────────────────────────
// ── Astronaut Detail Modal ────────────────────────────────────────────────────
function AstronautModal({ astronaut, onClose }) {
  if (!astronaut) return null;
  const bmi = astronaut.skeletal_muscle_mass_index;
  const fat = astronaut.body_fat_percentage;
  const rows = [
    { l: 'Min calories',         v: `${(astronaut.min_calories??0).toLocaleString()} kcal/day` },
    { l: 'Consumed today',       v: `${Math.round(astronaut.consumed_calories??0).toLocaleString()} kcal` },
    { l: 'Skeletal muscle idx',  v: bmi != null ? `${bmi.toFixed(1)} kg/m²` : '—' },
    { l: 'Body fat',             v: fat != null ? `${fat.toFixed(1)}%` : '—' },
  ];
  return (
    <div style={{
      position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',
      background:'rgba(0,0,0,0.6)',
    }} onClick={onClose}>
      <div style={{
        background:'#070d18',border:`1px solid rgba(255,255,255,0.12)`,
        width:300,padding:'20px',fontFamily:'IBM Plex Mono, monospace',
      }} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.35)',letterSpacing:'0.12em',marginBottom:4}}>
              {(astronaut.id||'').toUpperCase()} · CREW MEMBER
            </div>
            <div style={{fontSize:16,fontWeight:600,color:'#fff'}}>{astronaut.name}</div>
          </div>
          <button className="btn btn-sm" onClick={onClose} style={{fontSize:11,flexShrink:0}}>✕</button>
        </div>

        {/* Stats */}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {rows.map(r=>(
            <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              borderBottom:`1px solid rgba(255,255,255,0.06)`,paddingBottom:7}}>
              <span style={{fontSize:9,color:'rgba(255,255,255,0.4)',letterSpacing:'0.08em'}}>{r.l.toUpperCase()}</span>
              <span style={{fontSize:12,fontWeight:400,color:'#fff'}}>{r.v}</span>
            </div>
          ))}
        </div>

        {/* Caloric balance */}
        <div style={{marginTop:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:9,color:'rgba(255,255,255,0.4)',letterSpacing:'0.08em'}}>CALORIC BALANCE</span>
            <span style={{fontSize:9,color:'rgba(255,255,255,0.4)'}}>
              {Math.round(astronaut.consumed_calories??0)} / {Math.round(astronaut.min_calories??0)}
            </span>
          </div>
          <GaugeBar value={astronaut.consumed_calories??0} max={astronaut.min_calories??2200}
            color={(astronaut.consumed_calories??0)>=(astronaut.min_calories??2200)?'#28a84a':'#ff6b35'}/>
        </div>
      </div>
    </div>
  );
}

function LeftPanel({ state }) {
  const { astronauts=[], crew_health=[], nutrition_ledger, food_storage, active_crises, mars_env, facility_env } = state;
  const displayCrew = astronauts.length>0 ? astronauts : [1,2,3,4].map(i=>({id:i,name:`Astronaut ${i}`,min_calories:2200,consumed_calories:0}));
  const cov  = nutrition_ledger?.coverage_score ?? 0;
  const days = food_storage?.days_remaining ?? 0;
  const kcal = food_storage?.kcal ?? 0;
  const crisisEntries = Object.entries(active_crises||{});
  const me = mars_env || {};
  const fe = facility_env || {};
  const [selectedAstronaut, setSelectedAstronaut] = useState(null);

  return (
    <>
    <div style={{width:260,flexShrink:0,background:'#05080e',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflowY:'auto'}}>

      {/* Crew */}
      <div style={{borderBottom:`1px solid ${C.border}`}}>
        <div className="sec-hdr">
          <span className="lbl">Crew Status</span>
          <span style={{fontSize:9,color:C.muted}}>{displayCrew.length} CREW</span>
        </div>
        <div style={{padding:'8px 10px'}}>
          {displayCrew.map((a,i)=>{
            const rawH = a.health_score ?? crew_health[i]?.health_score ?? 100;
            const h = rawH > 1 ? rawH / 100 : rawH;
            const consumed = a.consumed_calories ?? 0;
            const minCal   = a.min_calories ?? 2200;
            const col = hColor(h);
            const deficits = a.deficit_flags || crew_health[i]?.deficit_flags || [];
            return (
              <div key={a.id||i} style={{marginBottom:8,cursor:'pointer'}}
                onClick={()=>setSelectedAstronaut({...a, deficit_flags: deficits, health_score: rawH})}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                  <span style={{flex:1,fontSize:11,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name||'Crew'}</span>

        const vitC_days = fs.vitamin_c ? Math.round(fs.vitamin_c / 400) : 0;
        const vitK_days = fs.vitamin_k ? Math.round(fs.vitamin_k / 480) : 0;

            </div>
          </div>
        );
      })()}

      {/* Facility */}
      <div style={{borderBottom:`1px solid ${C.border}`}}>
        <div className="sec-hdr"><span className="lbl">Facility</span></div>
        <div style={{padding:'6px 10px'}}>
          {[
            {l:'EXT TEMP',  v:`${(me.temperature??-60).toFixed(1)}°C`,         alert:(me.temperature??-60)>-20},
            {l:'CO₂',       v:`${(fe.co2??1200).toFixed(0)} ppm`,               alert:(fe.co2??1200)>1500},
            {l:'RADIATION', v:`${(fe.radiation??0.30).toFixed(2)} mSv`,         alert:(fe.radiation??0.30)>0.5},
            {l:'PRESSURE',  v:`${((fe.pressure??62000)/1000).toFixed(1)} kPa`,  alert:false},

    </div>

function GHCard({ gh, onClick }) {
  const h     = gh.health ?? 1;
  const col   = hColor(h);
  const alert = gh.disease_detected || (gh.alerts&&gh.alerts.length>0);
  const day   = Math.floor(gh.day??0);
  const pct   = Math.min(100,Math.round(h*100));
  const borderCol = alert ? 'rgba(255,50,36,0.55)'
                  : h<0.5  ? 'rgba(255,50,36,0.25)'

  return (
    <div className="gh-card" onClick={onClick}
      style={{borderColor:borderCol}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:9,fontWeight:600,color:C.muted,letterSpacing:'0.06em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
          {gh.name||ghLabel(gh.id)}

      <div style={{fontSize:20,fontWeight:300,color:col,lineHeight:1,marginBottom:5,letterSpacing:'-0.01em'}}>
        {pct}<span style={{fontSize:10,color:C.muted,marginLeft:1}}>%</span>

      <GaugeBar value={h} max={1} color={col}/>
      <div style={{display:'flex',gap:6,marginTop:5}}>
        <span style={{fontSize:9,color:C.muted,fontVariantNumeric:'tabular-nums'}}>{(gh.temperature??0).toFixed(0)}°</span>
        <span style={{fontSize:9,color:C.muted}}>{(gh.air_humidity??0).toFixed(0)}%</span>

// ── AI Agents Panel — auto-expands caution/critical agents ───────────────────
function AgentPanel({ report }) {
  const agents = [
    {id:'nutrition',   label:'Nutrition'},
    {id:'environment', label:'Environment'},
    {id:'crisis',      label:'Crisis'},
    {id:'planner',     label:'Planner'},
    {id:'vision',      label:'Vision'},
  ];

  function agentStatus(data) {
    if (!data) return 'dim';
    const t=(typeof data==='string'?data:JSON.stringify(data)).toLowerCase();
    if(t.includes('critical')||t.includes('danger')) return 'crit';
    if(t.includes('warn')||t.includes('low')||t.includes('deficit')) return 'warn';
    return 'ok';
  }

  function agentReason(data) {
    if (!data) return null;
    if (typeof data==='string') return data.slice(0,300);
    const s = data.summary||data.reasoning||data.deficit_summary||data.rationale
              ||data.recommendation||data.assessment||data.plan||data.status;
    if (s) return s.slice(0,300);
    if (data.coverage_score!=null) return `Coverage: ${Math.round(data.coverage_score)}%${data.deficit_summary?' — '+data.deficit_summary:''}`;
    return null;
  }

  const chipCol = {ok:C.ok, warn:C.warn, crit:C.crit, dim:C.dimmed};
  const chipLbl = {ok:'NOM', warn:'CAU', crit:'CRIT', dim:'—'};

  // manually track expanded, default-expand any warn/crit
  const [expanded, setExpanded] = useState({});

  return (
    <div style={{flex:1,overflowY:'auto'}}>
      {agents.map(({id,label})=>{
        const data = report?.[id];
        const reason = agentReason(data);
        const st   = agentStatus(data);
        const col  = chipCol[st];
        // auto-show reason for warn/crit unless user explicitly closed it
        const autoOpen = (st==='warn'||st==='crit') && expanded[id]!==false;
        const manualOpen = expanded[id]===true;
        const isOpen = autoOpen || manualOpen;
        const toggle = ()=>setExpanded(prev=>({...prev,[id]:!isOpen}));

        return (
          <div key={id} className={`agent-row${isOpen?' expanded':''}`} onClick={toggle}
            style={{borderLeft:'3px solid transparent'}}>
            <div style={{
              flexShrink:0, width:32, height:16, display:'flex', alignItems:'center', justifyContent:'center',
              background:'rgba(255,255,255,0.04)', border:`1px solid ${C.border}`,
              fontSize:8, fontWeight:400, color:C.muted, letterSpacing:'0.06em', marginTop:1,
            }}>
              {chipLbl[st]}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:10,fontWeight:600,color:C.text,letterSpacing:'0.04em'}}>{label.toUpperCase()}</span>
                {reason && <span style={{fontSize:9,color:C.dimmed}}>{isOpen?'▲':'▼'}</span>}
              </div>
              {isOpen && reason && (
                <div style={{
                  marginTop:4, padding:'5px 8px', background:'rgba(255,255,255,0.02)',
                  border:`1px solid ${C.border}`, marginBottom:2,
                }}>
                  <Md text={reason}/>
                </div>
              )}
              {!reason && <span style={{fontSize:10,color:C.dimmed}}>Awaiting data</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Camera & Robot Monitoring Panel ─────────────────────────────────────────
function CameraRobotPanel({ greenhouses, state }) {
  const [selectedId, setSelectedId] = useState('');
  const [scanAngle, setScanAngle]   = useState('top_down');
  const [scanResults, setScanResults] = useState(null);
  const [scanImage, setScanImage]   = useState(null);
  const [scanLoading, setScanLoading] = useState(false);

  // CV alerts from vision agent report
  const vision = state.agent_report?.vision || {};
  const plotsAtRisk = vision.plots_at_risk || [];
  const recActions  = vision.recommended_actions || [];

  // Greenhouse-level alerts from auto-scan (runs each sol)
  const ghsWithAlerts = (greenhouses||[]).filter(g=>(g.alerts||[]).length>0);

  // When a greenhouse is selected, load its latest_scan_results + auto-load image
  const selectedGh = (greenhouses||[]).find(g=>g.id===selectedId);
  useEffect(()=>{
    if(!selectedId) return;
    if(selectedGh?.latest_scan_results?.length>0 && !scanResults) {
      setScanResults({ scan_results: selectedGh.latest_scan_results, aggregate: { disease_detected: selectedGh.disease_detected } });
    }
    // Auto-load camera image for the current angle
    fetch(`${API}/camera-feed-angle/${selectedId}/${scanAngle}`)
      .then(r=>r.ok?r.blob():null)
      .then(b=>b?setScanImage(URL.createObjectURL(b)):null)
      .catch(()=>{});
  },[selectedId, scanAngle]);

  const ANGLES = [
    {id:'top_down',   label:'TOP'},
    {id:'side_left',  label:'SIDE'},
    {id:'close_up',   label:'CLOSE'},
    {id:'ground_level',label:'ROOT'},
  ];

  async function launchScan() {
    if(!selectedId) return;
    setScanLoading(true); setScanResults(null); setScanImage(null);
    try {
      const res = await fetch(`${API}/robot-scan/${selectedId}`,{method:'POST'});
      const data = await res.json();
      setScanResults(data);
      const imgRes = await fetch(`${API}/camera-feed-angle/${selectedId}/${scanAngle}`);
      if(imgRes.ok) setScanImage(URL.createObjectURL(await imgRes.blob()));
    } catch(e){}
    setScanLoading(false);
  }

  async function loadAngle(angleId) {
    setScanAngle(angleId);
    if(!scanResults||!selectedId) return;
    try {
      const imgRes = await fetch(`${API}/camera-feed-angle/${selectedId}/${angleId}`);
      if(imgRes.ok) setScanImage(URL.createObjectURL(await imgRes.blob()));
    } catch(e){}
  }

  return (
    <div style={{flex:1,overflowY:'auto'}}>

      {/* Daily scan alerts — greenhouse-level (auto-scan each sol) + vision agent plots */}
      {(ghsWithAlerts.length>0 || plotsAtRisk.length>0) && (
        <div style={{margin:'8px 10px 0',borderBottom:`1px solid ${C.border}`,paddingBottom:8}}>
          <div style={{fontSize:9,fontWeight:600,color:C.muted,letterSpacing:'0.12em',marginBottom:6}}>
            DAILY SCAN REPORT — {ghsWithAlerts.length + plotsAtRisk.length} ISSUE(S)
          </div>

          {/* Greenhouse alerts from auto-scan */}
          {ghsWithAlerts.map((gh,i)=>(
            <div key={gh.id}
              style={{marginBottom:4,padding:'5px 8px',border:`1px solid ${C.border}`,background:'rgba(255,255,255,0.02)',cursor:'pointer'}}
              onClick={()=>setSelectedId(gh.id)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                <span style={{fontSize:10,fontWeight:700,color:'#fff',letterSpacing:'0.04em'}}>
                  {(gh.name||gh.id).toUpperCase()}
                </span>
                <span style={{fontSize:10,color:C.muted,fontVariantNumeric:'tabular-nums'}}>
                  {Math.round((gh.health||1)*100)}%
                </span>
              </div>
              {(gh.alerts||[]).slice(0,1).map((a,ai)=>(
                <div key={ai} style={{fontSize:9,color:C.muted,marginTop:2,lineHeight:1.4}}>
                  {typeof a==='string'?a:a.text}
                </div>
              ))}
              <div style={{fontSize:8,color:C.dimmed,marginTop:3,letterSpacing:'0.06em'}}>— SELECT TO INSPECT</div>
            </div>
          ))}

          {/* Vision agent plot-level alerts */}
          {plotsAtRisk.map((p,i)=>(
            <div key={i}
              style={{marginBottom:4,padding:'5px 8px',border:`1px solid ${C.border}`,background:'rgba(255,255,255,0.02)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                <span style={{fontSize:10,fontWeight:700,color:'#fff',letterSpacing:'0.04em'}}>
                  {(p.plot_id||'').toUpperCase()}
                </span>
                <span style={{fontSize:10,color:C.muted,fontVariantNumeric:'tabular-nums'}}>
                  {Math.round((p.health_score||0)*100)}%
                </span>
              </div>
              {p.cv_reasoning&&<div style={{fontSize:9,color:C.muted,marginTop:2,lineHeight:1.4}}>{p.cv_reasoning.slice(0,80)}</div>}
            </div>
          ))}

          {recActions.length>0&&(
            <div style={{marginTop:6}}>
              <div style={{fontSize:8,color:C.dimmed,letterSpacing:'0.1em',marginBottom:4}}>RECOMMENDED ACTIONS</div>
              {recActions.slice(0,3).map((a,i)=>(
                <div key={i} style={{fontSize:9,color:C.muted,marginBottom:3,paddingLeft:8,borderLeft:`1px solid ${C.border}`}}>
                  {(a.action||'').replace(/_/g,' ').toUpperCase()} — {a.description}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Robot scan UI */}
      <div style={{padding:'8px 10px'}}>
        <div style={{marginBottom:8}}>
          <div className="lbl" style={{marginBottom:5}}>Select Greenhouse</div>
          <select className="ctrl-select" value={selectedId} onChange={e=>{ setSelectedId(e.target.value); setScanResults(null); setScanImage(null); setScanAngle('top_down'); }}
            style={{width:'100%',padding:'4px 6px',fontSize:11}}>
            <option value="">— choose greenhouse —</option>
            {(greenhouses||[]).map(g=>(
              <option key={g.id} value={g.id}>{g.name||ghLabel(g.id)}</option>
            ))}
          </select>
        </div>

        {selectedId && (
          <>


            {/* Angle selector */}
            <div style={{display:'flex',gap:4,marginBottom:8}}>
              {ANGLES.map(a=>(
                <button key={a.id} className={`tab-btn${scanAngle===a.id?' active':''}`}
                  onClick={()=>loadAngle(a.id)} style={{flex:1,textAlign:'center',padding:'3px 4px',fontSize:9}}>
                  {a.label}
                </button>
              ))}
            </div>

            {/* Image + results */}
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {scanImage
                ? <img src={scanImage} alt="scan" style={{width:110,height:110,flexShrink:0,border:`1px solid ${C.border}`}}/>
                : <div style={{width:110,height:110,flexShrink:0,border:`1px dashed ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:9,color:C.dimmed,letterSpacing:'0.06em'}}>{scanLoading?'SCANNING':'NO FEED'}</span>
                  </div>
              }
              {scanResults && (()=>{
                const ar = (scanResults.scan_results||[]).find(r=>r.angle_id===scanAngle);
                const agg = scanResults.aggregate||{};
                return (
                  <div style={{flex:1,minWidth:0}}>
                    {ar && <>
                      <div style={{fontSize:18,fontWeight:300,color:'#fff',lineHeight:1,letterSpacing:'0em'}}>
                        {Math.round((ar.health_score||0)*100)}<span style={{fontSize:11,color:C.muted,marginLeft:1}}>%</span>
                      </div>
                      <div style={{fontSize:9,color:C.muted,marginTop:2,letterSpacing:'0.06em'}}>CONF {Math.round((ar.confidence||0)*100)}%</div>
                      {(ar.stress_flags||[]).map((f,i)=>(
                        <div key={i} style={{fontSize:9,color:C.muted,fontWeight:600,marginTop:2,letterSpacing:'0.04em'}}>{f.replace(/_/g,' ').toUpperCase()}</div>
                      ))}
                      {ar.cv_reasoning&&<div style={{fontSize:9,color:C.muted,marginTop:3,lineHeight:1.5,whiteSpace:'normal',wordBreak:'break-word'}}>{ar.cv_reasoning}</div>}
                    </>}
                    {agg.disease_detected&&(
                      <div style={{marginTop:6,padding:'3px 6px',border:`1px solid ${C.border}`}}>
                        <span style={{fontSize:9,color:'#fff',fontWeight:700,letterSpacing:'0.06em'}}>DISEASE DETECTED</span>
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>

          </>
        )}

        {!selectedId && plotsAtRisk.length===0 && (
          <div style={{textAlign:'center',padding:'16px 0',fontSize:9,color:C.dimmed,letterSpacing:'0.06em'}}>
            SELECT A GREENHOUSE TO BEGIN MONITORING
          </div>
        )}
      </div>
    </div>
  );
}

function MissionTimeline({ solHistory, currentSol }) {
  const data = solHistory || [];
  if (data.length < 3) return (
    <div style={{padding:'16px',textAlign:'center',color:C.muted,fontSize:11,flexShrink:0}}>
      Run the simulation to see the mission timeline…
    </div>
  );

  const W = 800, H = 180, PAD = {t:20,b:28,l:40,r:16};
  const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;
  const maxSol = Math.max(data[data.length-1].sol || 1, 10);

  function x(sol) { return PAD.l + (sol / maxSol) * plotW; }
  function y(val, maxVal=100) { return PAD.t + plotH - (Math.min(val, maxVal) / maxVal) * plotH; }

  function linePath(key, maxVal=100) {
    return data.map((d,i)=>`${i===0?'M':'L'}${x(d.sol).toFixed(1)},${y(d[key]||0,maxVal).toFixed(1)}`).join(' ');
  }
  function areaPath(key, maxVal=100) {
    const line = data.map((d,i)=>`${i===0?'M':'L'}${x(d.sol).toFixed(1)},${y(d[key]||0,maxVal).toFixed(1)}`).join(' ');
    return line + ` L${x(data[data.length-1].sol).toFixed(1)},${(PAD.t+plotH).toFixed(1)} L${x(data[0].sol).toFixed(1)},${(PAD.t+plotH).toFixed(1)} Z`;
  }

  // Grid lines
  const yTicks = [0,25,50,75,100];
  const xTickInterval = maxSol <= 50 ? 10 : maxSol <= 150 ? 25 : maxSol <= 300 ? 50 : 100;
  const xTicks = [];
  for (let s = xTickInterval; s < maxSol; s += xTickInterval) xTicks.push(s);

  return (
    <div style={{flexShrink:0,padding:'8px 12px'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:16}}>
          <span style={{fontSize:9,color:C.muted}}><span style={{display:'inline-block',width:14,height:2,background:'#28d860',verticalAlign:'middle',marginRight:4}}/>COVERAGE</span>
          <span style={{fontSize:9,color:C.muted}}><span style={{display:'inline-block',width:14,height:2,background:'#4a90d4',verticalAlign:'middle',marginRight:4}}/>CREW HEALTH</span>
          <span style={{fontSize:9,color:C.muted}}><span style={{display:'inline-block',width:1,height:10,background:C.muted,verticalAlign:'middle',marginRight:4}}/>HARVEST</span>
          <span style={{fontSize:9,color:C.muted}}><span style={{display:'inline-block',width:8,height:2,background:C.muted,verticalAlign:'middle',marginRight:4}}/>CRISIS</span>
        </div>
        <span style={{fontSize:10,color:C.muted}}>SOL {currentSol} / 450</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:200,background:'rgba(0,0,0,0.2)',border:`1px solid ${C.border}`}}>
        {/* Grid */}
        {yTicks.map(v=>(
          <g key={v}>
            <line x1={PAD.l} y1={y(v)} x2={W-PAD.r} y2={y(v)} stroke="rgba(255,255,255,0.05)" strokeWidth={0.5}/>
            <text x={PAD.l-4} y={y(v)+3} textAnchor="end" fill={C.muted} fontSize={8} fontFamily="IBM Plex Mono">{v}%</text>
          </g>
        ))}
        {xTicks.map(s=>(
          <g key={s}>
            <line x1={x(s)} y1={PAD.t} x2={x(s)} y2={PAD.t+plotH} stroke="rgba(255,255,255,0.04)" strokeWidth={0.5}/>
            <text x={x(s)} y={H-6} textAnchor="middle" fill={C.muted} fontSize={8} fontFamily="IBM Plex Mono">{s}</text>
          </g>
        ))}

        {/* Crisis bands */}
        {data.filter(d=>(d.crises_active||[]).length>0).map((d,i)=>(
          <rect key={'c'+i} x={x(d.sol)-1} y={PAD.t} width={Math.max(2,plotW/maxSol+1)} height={plotH} fill="rgba(255,50,36,0.12)"/>
        ))}

        {/* Area fills */}
        <path d={areaPath('nutrition_score')} fill="rgba(40,216,96,0.06)"/>
        <path d={areaPath('crew_health_avg')} fill="rgba(74,144,212,0.06)"/>

        {/* Lines */}
        <path d={linePath('nutrition_score')} fill="none" stroke="#28d860" strokeWidth={1.5} strokeLinejoin="round"/>
        <path d={linePath('crew_health_avg')} fill="none" stroke="#4a90d4" strokeWidth={1.5} strokeLinejoin="round"/>

        {/* Harvest markers — neutral tick below chart */}
        {data.filter(d=>d.num_harvests>0).map((d,i)=>(
          <line key={'h'+i} x1={x(d.sol)} y1={PAD.t+plotH+2} x2={x(d.sol)} y2={PAD.t+plotH+10} stroke={C.muted} strokeWidth={1}/>
        ))}

        {/* Current sol marker */}
        <line x1={x(currentSol||0)} y1={PAD.t} x2={x(currentSol||0)} y2={PAD.t+plotH} stroke="rgba(255,255,255,0.2)" strokeWidth={1} strokeDasharray="3,3"/>
      </svg>

      {/* Stats row */}
      <div style={{display:'flex',gap:12,marginTop:8}}>
        {[
          {l:'AVG COVERAGE', v:data.length>0 ? (data.reduce((s,d)=>s+(d.nutrition_score||0),0)/data.length).toFixed(1)+'%' : '—'},
          {l:'AVG HEALTH', v:data.length>0 ? (data.reduce((s,d)=>s+(d.crew_health_avg||0),0)/data.length).toFixed(1)+'%' : '—'},
          {l:'TOTAL HARVESTS', v:data.reduce((s,d)=>s+(d.num_harvests||0),0)},
          {l:'CRISES', v:data.filter(d=>(d.crises_active||[]).length>0).length+' sols'},
        ].map(s=>(
          <div key={s.l} style={{flex:1,padding:'5px 8px',border:`1px solid ${C.border}`,background:'rgba(255,255,255,0.015)'}}>
            <div style={{fontSize:8,color:C.muted,letterSpacing:'0.08em',marginBottom:2}}>{s.l}</div>
            <div style={{fontSize:14,fontWeight:700,color:'#fff'}}>{s.v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CenterPanel({ state, onSelectGh }) {
  const [bottomTab, setBottomTab] = useState('agents');
  const { greenhouses=[], agent_report={}, mission_state } = state;
  const mcp = mission_state?.mcp_connected;

  // Show badge on camera tab if CV alerts exist
  const visionAlerts = (agent_report?.vision?.plots_at_risk||[]).length;

  // Count greenhouses that have alerts from the latest auto-scan
  const ghAlerts = (greenhouses||[]).filter(g=>(g.alerts||[]).length>0).length;
  const totalAlerts = visionAlerts + ghAlerts;

  // Auto-switch to camera tab when new alerts appear after a sol scan
  const prevAlerts = useRef(0);
  useEffect(()=>{
    if(totalAlerts > 0 && prevAlerts.current === 0) {
      setBottomTab('camera');
    }
    prevAlerts.current = totalAlerts;
  },[totalAlerts]);

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
      <div className="sec-hdr">
        <span className="lbl">Greenhouse Monitoring</span>
        <span style={{fontSize:9,color:C.muted}}>SELECT TO INSPECT</span>
      </div>
      <GreenhouseGrid greenhouses={greenhouses} onSelect={onSelectGh}/>

      {/* Bottom section tabs */}
      <div style={{display:'flex',borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,background:'rgba(255,255,255,0.015)',flexShrink:0}}>
        {[
          {id:'agents', label:'AI AGENTS & TIMELINE'},
          {id:'camera', label:`CAMERA & ROBOT${totalAlerts>0?` (${totalAlerts}!)`:''}`, alert:totalAlerts>0},
        ].map(t=>(
          <button key={t.id} onClick={()=>setBottomTab(t.id)}
            style={{
              flex:1, padding:'5px 0', background:'transparent', border:'none', cursor:'pointer',
              fontSize:9, fontWeight:700, letterSpacing:'0.1em',
              color: bottomTab===t.id ? (t.alert?C.crit:C.blue) : (t.alert?C.warn:C.muted),
              borderBottom: bottomTab===t.id ? `2px solid ${t.alert?C.crit:C.blue}` : '2px solid transparent',
              fontFamily:'IBM Plex Mono, monospace',
            }}>
            {t.label}
          </button>
        ))}
      </div>

      {bottomTab==='agents' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
          <MissionTimeline solHistory={state.sol_history||[]} currentSol={mission_state?.current_sol||0}/>
          <div style={{borderTop:`1px solid ${C.border}`,flexShrink:0}}/>
          <AgentPanel report={agent_report} mcp={mcp}/>
        </div>
      )}
      {bottomTab==='camera' && <CameraRobotPanel greenhouses={greenhouses} state={state}/>}
    </div>
  );
}

// ── Right Panel (Chat) ───────────────────────────────────────────────────────
function RightPanel({ state }) {
  const [messages, setMessages] = useState([{role:'sys',text:'Mission AI ready. Ask about any greenhouse, crew status, or get recommendations.'}]);
  const [input, setInput]       = useState('');
  const [loading, setLoading]   = useState(false);
  const msgRef = useRef(null);

  useEffect(()=>{ if(msgRef.current) msgRef.current.scrollTop=msgRef.current.scrollHeight; },[messages,loading]);

  async function sendMsg() {
    const msg = input.trim();
    if(!msg||loading) return;
    setMessages(m=>[...m,{role:'user',text:msg}]);
    setInput('');
    setLoading(true);
    try {
      const res  = await fetch(`${API}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
      const data = await res.json();
      setMessages(m=>[...m,{role:'ai',text:data.response||data.reply||data.message||'OK'}]);
    } catch(e) {
      setMessages(m=>[...m,{role:'sys',text:'Comm error — retry'}]);
    }
    setLoading(false);
  }

  return (
    <div style={{width:360,flexShrink:0,background:'#05080e',borderLeft:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="sec-hdr">
        <span className="lbl">Mission AI</span>
        <span style={{fontSize:9,fontWeight:600,color:loading?C.warn:C.green}}>{loading?'PROCESSING':'READY'}</span>
      </div>
      <div ref={msgRef} style={{flex:1,overflowY:'auto',padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',flexDirection:'column'}}>
            {m.role==='sys'  && <div className="bubble-sys">{m.text}</div>}
            {m.role==='user' && <div className="bubble-user"><div style={{fontSize:12,lineHeight:1.6}}>{m.text}</div></div>}
            {m.role==='ai'   && <div className="bubble-ai"><Md text={m.text}/></div>}
          </div>
        ))}
        {loading && (
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span className="dot" style={{width:6,height:6,background:C.accent,animation:'blink 0.8s ease-in-out infinite'}}/>
            <span style={{fontSize:10,color:C.muted}}>Processing…</span>
          </div>
        )}
      </div>
      <div style={{padding:'8px',borderTop:`1px solid ${C.border}`,display:'flex',gap:6,flexShrink:0}}>
        <input className="chat-input" placeholder="Ask mission AI…" value={input}
          onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()}/>
        <button className="btn btn-sm" onClick={sendMsg} style={{flexShrink:0,padding:'7px 14px',fontSize:10,letterSpacing:'0.07em',borderRadius:0}}>SEND</button>
      </div>
    </div>
  );
}

// ── Detail Drawer ─────────────────────────────────────────────────────────────
function DetailDrawer({ gh, state, onClose }) {
  if(!gh) return null;

  const cropId   = gh.crop_id || 'lettuce';
  const h        = gh.health ?? 1;
  const hCol     = hColor(h);
  const crops    = state?.crops || {};
  const cropData = crops[cropId] || {};

  const sensors = [
    {label:'Temperature',  val:gh.temperature,  unit:'°C',  lo:10,hi:40,  goodLo:18,goodHi:28},
    {label:'Air Humidity', val:gh.air_humidity, unit:'%',   lo:0, hi:100, goodLo:55,goodHi:80},
    {label:'Light',        val:gh.light,        unit:'µmol',lo:0, hi:1000,goodLo:200,goodHi:700},
    {label:'pH',           val:gh.ph,           unit:'',    lo:0, hi:14,  goodLo:5.5,goodHi:7.5},
    {label:'Soil Moisture',val:gh.soil_moisture,unit:'VWC', lo:0, hi:1,   goodLo:0.2,goodHi:0.5},
  ];

  return (
    <>
      <div className="drawer-overlay" onClick={onClose}/>
      <div className="drawer-panel">
        {/* Header */}
        <div style={{padding:'0 14px',borderBottom:`1px solid ${C.border}`,flexShrink:0,display:'flex',alignItems:'center',gap:12,height:54}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:8,color:C.muted,letterSpacing:'0.14em',marginBottom:3}}>{(gh.crop_id||'').toUpperCase()} GREENHOUSE</div>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>{gh.name||ghLabel(gh.id)}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:22,fontWeight:300,color:hCol,lineHeight:1,letterSpacing:'0em'}}>{Math.round(h*100)}<span style={{fontSize:11,color:C.muted,marginLeft:1}}>%</span></div>
            <div style={{fontSize:9,color:C.muted,marginTop:2}}>
              Day {Math.floor(gh.day||0)}
              {gh.disease_detected && <span style={{color:C.muted,fontWeight:400,marginLeft:6}}>DISEASE</span>}
            </div>
          </div>
          <button className="btn btn-sm" onClick={onClose} style={{flexShrink:0,fontSize:12}}>✕</button>
        </div>
        <GaugeBar value={h} max={1} color={hCol} width="100%"/>

        {/* Combined scrollable content */}
        <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>

          {/* Key stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:10}}>
            {[
              {l:'Growth cycle', v:cropData.growth_cycle?`${cropData.growth_cycle} sols`:'—'},
              {l:'Current day',  v:`${Math.floor(gh.day||0)} / ${cropData.growth_cycle||120}`},
              {l:'Yield/m²',    v:cropData.max_typical_yield?`${cropData.max_typical_yield} kg`:'—'},
              {l:'CV confidence',v:(gh.last_scan_sol??-1)<0?'—':`${Math.round((gh.cv_confidence||0)*100)}%`},
            ].map(({l,v})=>(
              <div key={l} style={{padding:'6px 8px',border:`1px solid ${C.border}`,background:C.panel}}>
                <div style={{fontSize:8,color:C.muted,letterSpacing:'0.08em',marginBottom:2}}>{l.toUpperCase()}</div>
                <div style={{fontSize:12,fontWeight:400,color:C.text}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Growth progress */}
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:9,color:C.muted,letterSpacing:'0.08em'}}>GROWTH PROGRESS</span>
              <span style={{fontSize:10,fontWeight:400,color:C.muted}}>{Math.round((gh.day||0)/(cropData.growth_cycle||120)*100)}<span style={{fontSize:9,marginLeft:1}}>%</span></span>
            </div>
            <GaugeBar value={gh.day||0} max={cropData.growth_cycle||120} color={C.accent}/>
          </div>

          {/* Stress flags — only when present */}
          {gh.stress_flags&&gh.stress_flags.length>0&&(
            <div style={{padding:'6px 8px',marginBottom:10,borderLeft:`2px solid ${C.border}`,background:'rgba(255,255,255,0.02)'}}>
              <div style={{fontSize:8,color:C.muted,letterSpacing:'0.1em',marginBottom:4}}>STRESS CONDITIONS</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {gh.stress_flags.map((f,i)=>(
                  <span key={i} style={{fontSize:10,color:C.muted,fontWeight:400,letterSpacing:'0.04em'}}>{f.replace(/_/g,' ').toUpperCase()}</span>
                ))}
              </div>
            </div>
          )}

          {/* Alerts — only when present */}
          {gh.alerts&&gh.alerts.length>0&&(
            <div style={{padding:'8px',marginBottom:10,border:`1px solid ${C.border}`,background:'rgba(255,255,255,0.02)'}}>
              <div className="lbl" style={{marginBottom:4}}>Alerts</div>
              {gh.alerts.map((a,i)=>(
                <div key={i} style={{fontSize:11,color:C.text,marginBottom:3,lineHeight:1.5}}>
                  {typeof a==='string' ? a : a?.text || JSON.stringify(a)}
                </div>
              ))}
            </div>
          )}

          {/* Sensors divider */}
          <div style={{fontSize:9,fontWeight:600,color:C.muted,letterSpacing:'0.12em',marginBottom:8,paddingTop:4,borderTop:`1px solid ${C.border}`}}>
            SENSORS
          </div>

          {/* Sensor readings */}
          {sensors.map(({label,val,unit,lo,hi,goodLo,goodHi})=>{
            const v=val??0;
            const ok=v>=goodLo&&v<=goodHi;
            const col=ok?'#28a84a':Math.abs(v-goodLo)<(goodHi-goodLo)*0.6&&Math.abs(v-goodHi)<(goodHi-goodLo)*0.6?C.warn:C.crit;
            return (
              <div key={label} style={{marginBottom:8,padding:'8px 10px',border:`1px solid ${ok?C.border:col+'44'}`,background:C.panel}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                  <span style={{fontSize:9,color:C.muted,letterSpacing:'0.1em'}}>{label.toUpperCase()}</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:20,fontWeight:700,color:col,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>
                      {typeof v==='number'?v.toFixed(1):v}
                      <span style={{fontSize:10,color:C.muted,fontWeight:400}}> {unit}</span>
                    </span>
                    <span style={{fontSize:10,fontWeight:700,color:col,minWidth:22}}>{ok?'OK':'!'}</span>
                  </div>
                </div>
                <RangeBar value={v} lo={lo} hi={hi} goodLo={goodLo} goodHi={goodHi}/>
                <div style={{fontSize:9,color:C.dimmed,marginTop:4,letterSpacing:'0.06em'}}>NOM: {goodLo}–{goodHi} {unit}</div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

// ── Astronaut-in-the-Loop Approval Modal ──────────────────────────────────
function ApprovalModal({ pending, sol }) {
  const [chatMessages, setChatMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [decided, setDecided] = useState(false);
  const chatRef = useRef(null);

  const items = pending?.summary || [];

  useEffect(()=>{
    if(chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  },[chatMessages, loading]);

  async function decide(action) {
    setDecided(true);
    try {
      await fetch(`${API}/astronaut-decide`, {
        method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action, message:''}),
      });
    } catch(e){}
  }

  async function sendFeedback() {
    const msg = input.trim();
    if(!msg || loading) return;
    setChatMessages(m=>[...m, {role:'user', text:msg}]);
    setInput('');
    setLoading(true);
    try {
      const res = await fetch(`${API}/astronaut-decide`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'feedback', message:msg}),
      });
      const data = await res.json();
      setChatMessages(m=>[...m, {role:'ai', text:data.response||'Acknowledged.'}]);
    } catch(e) {
      setChatMessages(m=>[...m, {role:'ai', text:'Comm error — retry.'}]);
    }
    setLoading(false);
  }

  if(decided) return null;

  return (
    <div className="approval-overlay">
      <div className="approval-modal">
        {/* Header */}
        <div className="approval-header">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:8,height:8,background:'#fff',flexShrink:0}}/>
            <span style={{fontSize:13,fontWeight:700,letterSpacing:'0.08em',color:'#fff'}}>
              ASTRONAUT REVIEW REQUIRED
            </span>
          </div>
          <span style={{fontSize:11,color:C.muted,letterSpacing:'0.06em'}}>SOL {sol}</span>
        </div>

        {/* Description */}
        <div style={{padding:'10px 16px',borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.muted}}>
          Agents have analyzed current conditions and propose the following actions.
          Review, discuss, or override before they are applied.
        </div>

        {/* Decision items */}
        <div style={{flex:1,overflowY:'auto',minHeight:0}}>
          {items.map((item,i) => (
            <div key={i} className="approval-item">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:'0.1em'}}>
                  {(item.agent||'AGENT').toUpperCase()}
                </span>
              </div>
              <div style={{fontSize:12,color:'#fff',marginBottom:3,fontWeight:500}}>
                {item.action}
              </div>
              {item.reasoning && (
                <div style={{fontSize:10,color:C.muted,lineHeight:1.5}}>
                  {item.reasoning.length > 120 ? item.reasoning.slice(0,120)+'…' : item.reasoning}
                </div>
              )}
            </div>
          ))}
          {items.length === 0 && (
            <div style={{padding:16,fontSize:11,color:C.muted,textAlign:'center'}}>
              No significant actions proposed this sol.
            </div>
          )}
        </div>

        {/* Chat with AI */}
        {chatMessages.length > 0 && (
          <div ref={chatRef} style={{maxHeight:150,overflowY:'auto',padding:'8px 16px',borderTop:`1px solid ${C.border}`,display:'flex',flexDirection:'column',gap:6}}>
            {chatMessages.map((m,i) => (
              <div key={i}>
                {m.role==='user' && (
                  <div style={{fontSize:11,color:'#fff',background:'rgba(255,255,255,0.04)',border:`1px solid rgba(255,255,255,0.12)`,padding:'5px 9px',alignSelf:'flex-end',maxWidth:'90%'}}>
                    <span style={{fontSize:9,color:C.muted,fontWeight:600,letterSpacing:'0.08em'}}>ASTRONAUT</span>
                    <div style={{marginTop:2}}>{m.text}</div>
                  </div>
                )}
                {m.role==='ai' && (
                  <div style={{background:'rgba(255,255,255,0.015)',border:`1px solid ${C.border}`,padding:'5px 9px',maxWidth:'90%'}}>
                    <span style={{fontSize:9,color:C.muted,fontWeight:600,letterSpacing:'0.08em'}}>MISSION AI</span>
                    <Md text={m.text} style={{marginTop:4}}/>
                  </div>
                )}
              </div>
            ))}
            {loading && (
              <div style={{fontSize:10,color:C.muted,letterSpacing:'0.06em'}}>PROCESSING…</div>
            )}
          </div>
        )}

        {/* Input + Buttons */}
        <div style={{padding:'10px 16px',borderTop:`1px solid ${C.border}`,display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',gap:6}}>
            <input className="chat-input" placeholder="Discuss with Mission AI before deciding…"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&sendFeedback()}
              style={{fontSize:11}}
            />
            <button className="btn btn-sm" onClick={sendFeedback} disabled={loading || !input.trim()}
              style={{flexShrink:0,opacity:(loading||!input.trim())?0.4:1}}>
              ASK
            </button>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn" onClick={()=>decide('reject')}
              style={{padding:'6px 20px',fontSize:11,fontWeight:600,letterSpacing:'0.06em',color:C.muted,borderColor:C.border}}>
              REJECT
            </button>
            <button className="btn" onClick={()=>decide('approve')}
              style={{padding:'6px 20px',fontSize:11,fontWeight:600,letterSpacing:'0.06em',color:'#fff',borderColor:'rgba(255,255,255,0.4)',background:'rgba(255,255,255,0.06)'}}>
              APPROVE
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, setState]           = useState(DEFAULT_STATE);
  const [appLoading, setAppLoading] = useState(true);
  const [selectedGh, setSelectedGh] = useState(null);
  const wsRef    = useRef(null);
  const prevSol  = useRef(null);

  // Sequential greenhouse scan queue
  const [scanQueue,  setScanQueue]  = useState([]);
  const [scanningId, setScanningId] = useState(null);
  const scanningRef    = useRef(null);  // id currently being fetched
  const wasRunningRef  = useRef(false); // whether sim was running before scan started

  async function simControl(action, extra={}) {
    try { await fetch(`${API}/sim-control`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...extra})}); }
    catch(e){}
  }

  useEffect(()=>{
    fetch(`${API}/state`)
      .then(r=>r.json())
      .then(data=>{ setState(s=>({...s,...data})); setAppLoading(false); })
      .catch(()=>setAppLoading(false));
  },[]);

  useEffect(()=>{
    function connect() {
      const ws = new WebSocket(WS_URL);
      wsRef.current = ws;
      ws.onopen    = ()=>console.log('[OrbitGrow] WS connected');
      ws.onmessage = e=>{
        try {
          const data = JSON.parse(e.data);
          setState(s=>({...s,...data}));
          // Detect sol change → pause sim and queue all greenhouses for sequential scan
          const newSol = data?.mission_state?.current_sol;
          if(newSol != null && prevSol.current != null && newSol !== prevSol.current) {
            wasRunningRef.current = data?.mission_state?.sim_running ?? false;
            setScanQueue([...GH_IDS]);
          }
          if(newSol != null) prevSol.current = newSol;
        } catch(err){}
      };
      ws.onclose = ()=>setTimeout(connect,3000);
      ws.onerror = ()=>ws.close();
    }
    connect();
    return ()=>{ if(wsRef.current) wsRef.current.close(); };
  },[]);

  // Process scan queue one greenhouse at a time.
  // Pauses the sim before starting, resumes after all done.
  useEffect(()=>{
    // Starting a new batch — pause the sim
    if(scanQueue.length===GH_IDS.length && !scanningRef.current) {
      simControl('pause');
    }

    if(scanQueue.length===0 && !scanningRef.current && scanningId===null) {
      // All done — resume if sim was running before
      if(wasRunningRef.current && !state.pending_approval) simControl('start');
      return;
    }

    if(scanQueue.length===0 || scanningRef.current) return;

    const [next, ...rest] = scanQueue;
    scanningRef.current = next;
    setScanningId(next);
    setScanQueue(rest);

    fetch(`${API}/robot-scan/${next}`, {method:'POST'})
      .catch(()=>{})
      .finally(()=>{
        scanningRef.current = null;
        setScanningId(null);  // triggers re-run → picks next item
      });
  },[scanQueue, scanningId]);

  const liveSelectedGh = useMemo(()=>{
    if(!selectedGh) return null;
    return (state.greenhouses||[]).find(g=>g.id===selectedGh.id) || selectedGh;
  },[selectedGh,state.greenhouses]);

  if(appLoading) return <LoadingScreen/>;

  const scanned = GH_IDS.length - scanQueue.length;
  const scanTotal = scanningId || scanQueue.length > 0;
  const scanProgress = scanTotal
    ? `ROBOT SCAN  ${scanned}/${GH_IDS.length}  —  ${scanningId ? ((state.greenhouses||[]).find(g=>g.id===scanningId)?.name || scanningId) : 'QUEUED'}`
    : null;

  return (
    <div style={{width:'100vw',height:'100vh',display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
      <Header state={state} scanProgress={scanProgress}/>
      <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden'}}>
        <LeftPanel state={state}/>
        <div className="col-divider"/>
        <CenterPanel state={state} onSelectGh={setSelectedGh}/>
        <div className="col-divider"/>
        <RightPanel state={state}/>
      </div>
      {liveSelectedGh && <DetailDrawer gh={liveSelectedGh} state={state} onClose={()=>setSelectedGh(null)}/>}
      {state.pending_approval && (
        <ApprovalModal
          pending={state.pending_approval}
          sol={state.mission_state?.current_sol || 0}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
